<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="theme-color" content="#0a0a0f"/>
<title>Garage Door Control</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0f;--surface:#12121a;--panel:#1a1a28;--border:#2a2a40;
  --accent:#00e5ff;--danger:#ff3d5a;--success:#00ff99;--warn:#ffb020;
  --text:#e8e8f0;--muted:#5a5a7a;
}
html,body{height:100%;background:var(--bg);color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;
  -webkit-font-smoothing:antialiased;overflow-x:hidden}
body{min-height:100dvh;display:flex;flex-direction:column;align-items:center;
  padding:max(env(safe-area-inset-top),12px) 8px max(env(safe-area-inset-bottom),12px);
  background-image:radial-gradient(ellipse 80% 40% at 50% -10%,rgba(0,229,255,0.07) 0%,transparent 70%)}

/* HEADER */
header{width:100%;max-width:380px;display:flex;align-items:center;
  justify-content:space-between;padding:8px 4px 10px}
.logo{font-family:monospace;font-size:11px;letter-spacing:0.18em;
  color:var(--muted);text-transform:uppercase}
/* FIX: Both words now light up */
.logo .lit {color:var(--accent); text-shadow: 0 0 10px rgba(0,229,255,0.4);}

#conn-pill{display:flex;align-items:center;gap:6px;font-family:monospace;
  font-size:10px;color:var(--muted);background:var(--surface);
  border:1px solid var(--border);border-radius:20px;padding:4px 10px}
#conn-dot{width:7px;height:7px;border-radius:50%;background:var(--muted)}
#conn-pill.connected #conn-dot{background:var(--success);box-shadow:0 0 8px var(--success)}

/* MAIN CARD */
.card{width:100%;max-width:380px;background:var(--surface);
  border:1px solid var(--border);border-radius:18px;overflow:hidden;margin-top:10px}

/* TOP STATUS - 30% BIGGER */
.status-area{padding:40px 16px;display:flex;flex-direction:column;
  align-items:center;gap:15px;
  background:linear-gradient(180deg,rgba(0,229,255,0.06) 0%,transparent 100%);
  border-bottom:1px solid var(--border)}
.garage-title{font-family:monospace;font-size:12px;letter-spacing:0.3em;
  color:var(--muted);text-transform:uppercase}
#status-badge{font-family:monospace;font-size:22px;font-weight:700;
  letter-spacing:0.2em;text-transform:uppercase;padding:12px 30px;
  border-radius:30px;border:1px solid var(--border);
  background:var(--panel);color:var(--muted);transition:all 0.4s}
#status-badge.open{color:var(--success);border-color:var(--success);background:rgba(0,255,153,0.05)}
#status-badge.closed{color:var(--accent);border-color:var(--accent);background:rgba(0,229,255,0.05)}

/* SIDE BY SIDE STATUS - Forced layout */
.indicators{display:flex; flex-direction: row; width: 100%; height: 100px; border-bottom:1px solid var(--border)}
.ind{flex: 1; display:flex; align-items:center; justify-content:center;
  font-family:monospace; font-size:12px; font-weight:bold; letter-spacing:0.15em;
  color:var(--muted); text-transform:uppercase; transition: all 0.3s ease;
  background: transparent;}
.ind:first-child{border-right:1px solid var(--border)}

/* Active Area Lighting */
.ind.active-open { background: rgba(0,255,153,0.15); color: var(--success); }
.ind.active-close { background: rgba(0,229,255,0.15); color: var(--accent); }

/* CONTROLS */
.controls{padding:16px; display:grid; grid-template-columns: 1fr 1fr; gap:10px}
.btn{display:flex; flex-direction:column; align-items:center; justify-content:center;
  padding:20px 8px; border-radius:12px; border:1px solid var(--border);
  background:var(--panel); color:var(--text); font-weight:600; text-transform:uppercase;
  cursor:pointer; transition:all 0.15s; -webkit-appearance:none; appearance:none}
.btn-open{color:var(--success); border-color:rgba(0,255,153,0.2)}
.btn-close{color:var(--accent); border-color:rgba(0,229,255,0.2)}

/* CANCEL BUTTON - Requirement: Professional spacing from bottom */
.btn-stop{grid-column: 1 / -1; border-color:rgba(255,61,90,0.4);
  background:rgba(255,61,90,0.07); color:var(--danger);
  padding:30px 13px; font-size:14px; margin-bottom: 4px;} /* Added margin for professional look */

/* LOG - 20% Taller */
.log-card{width:100%; max-width:380px; background:var(--surface);
  border:1px solid var(--border); border-radius:14px; margin-top:12px; overflow:hidden}
#log{padding:10px 14px; max-height:160px; overflow-y:auto; display:flex; flex-direction:column; gap:6px}
.log-header{padding:10px 14px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; font-size:10px; color:var(--muted); font-family:monospace}

/* SETTINGS */
.settings-card{width:100%; max-width:380px; background:var(--surface); border:1px solid var(--border); border-radius:14px; margin-top:12px; margin-bottom: 30px; overflow:hidden}
</style>
</head>
<body>

<header>
  <div class="logo"><span class="lit">GARAGE DOOR</span></div>
  <div id="conn-pill">
    <div id="conn-dot"></div>
    <span id="conn-label">OFFLINE</span>
  </div>
</header>

<div class="card">
  <div class="status-area">
    <div class="garage-title">Door Status</div>
    <div id="status-badge">UNKNOWN</div>
  </div>

  <div class="indicators">
    <div class="ind" id="ind-open">OPEN</div>
    <div class="ind" id="ind-close">CLOSED</div>
  </div>

  <div class="controls">
    <button class="btn btn-open" id="btn-open">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="margin-bottom:4px"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
      OPEN
    </button>
    <button class="btn btn-close" id="btn-close">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="margin-bottom:4px"><path d="M12 5v14M19 12l-7 7-7-7"/></svg>
      CLOSE
    </button>
    <button class="btn btn-stop" id="btn-stop">
      <span style="font-size:18px; margin-right:8px">✕</span> CANCEL WARNING
    </button>
  </div>
</div>

<div class="log-card">
  <div class="log-header">
    <span>EVENT LOG</span>
    <span id="log-count">0 events</span>
  </div>
  <div id="log"></div>
</div>

<div class="settings-card">
  <div style="padding:15px; font-family:monospace; font-size:10px; color:var(--muted); display:flex; justify-content:space-between; align-items:center">
    <span>MQTT SETTINGS</span>
    <span>▼</span>
  </div>
</div>

<script>
// Logic to handle the side-by-side UI updates
function updateStatus(s) {
  var badge = document.getElementById('status-badge');
  badge.textContent = s;
  badge.className = (s||'').toLowerCase();
  
  // Highlight the correct side-by-side box
  document.getElementById('ind-open').className  = 'ind' + (s==='OPEN'  ?' active-open':'');
  document.getElementById('ind-close').className = 'ind' + (s==='CLOSED'?' active-close':'');
}

// Simulated connection / status for preview
window.onload = () => {
  updateStatus("OPEN"); // Set to OPEN for preview
  document.getElementById('conn-pill').classList.add('connected');
  document.getElementById('conn-label').innerText = "ONLINE";
};
</script>
</body>
</html>
