<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="theme-color" content="#0a0a0f"/>
<title>Garage Door Control</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0f;--surface:#12121a;--panel:#1a1a28;--border:#2a2a40;
  --accent:#00e5ff;--danger:#ff3d5a;--success:#00ff99;--warn:#ffb020;
  --text:#e8e8f0;--muted:#5a5a7a;
}
html,body{height:100%;background:var(--bg);color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;
  -webkit-font-smoothing:antialiased;overflow-x:hidden}
body{min-height:100dvh;display:flex;flex-direction:column;align-items:center;
  padding:max(env(safe-area-inset-top),12px) 8px max(env(safe-area-inset-bottom),12px);
  background-image:radial-gradient(ellipse 80% 40% at 50% -10%,rgba(0,229,255,0.07) 0%,transparent 70%)}

/* HEADER */
header{width:100%;max-width:380px;display:flex;align-items:center;
  justify-content:space-between;padding:8px 0 10px}
.logo{font-family:monospace;font-size:11px;letter-spacing:0.18em;
  color:var(--muted);text-transform:uppercase}
/* Fixed: Ensuring the entire span lights up */
.logo span{color:var(--accent); text-shadow: 0 0 12px rgba(0,229,255,0.5);}

#conn-pill{display:flex;align-items:center;gap:6px;font-family:monospace;
  font-size:10px;color:var(--muted);background:var(--surface);
  border:1px solid var(--border);border-radius:20px;padding:4px 10px}
#conn-dot{width:7px;height:7px;border-radius:50%;background:var(--muted)}
#conn-pill.connected #conn-dot{background:var(--success);box-shadow:0 0 8px var(--success)}

/* MAIN CARD */
.card{width:100%;max-width:380px;background:var(--surface);
  border:1px solid var(--border);border-radius:18px;overflow:hidden;margin-top:10px;
  display: flex; flex-direction: column;}

/* TOP WINDOW - 30% BIGGER */
.status-area{padding:45px 16px 35px;display:flex;flex-direction:column;
  align-items:center;gap:18px;
  background:linear-gradient(180deg,rgba(0,229,255,0.06) 0%,transparent 100%);
  border-bottom:1px solid var(--border)}
.garage-title{font-family:monospace;font-size:13px;letter-spacing:0.3em;
  color:var(--muted);text-transform:uppercase}
#status-badge{font-family:monospace;font-size:24px;font-weight:700;
  letter-spacing:0.2em;text-transform:uppercase;padding:14px 40px;
  border-radius:30px;border:1px solid var(--border);
  background:var(--panel);color:var(--muted);transition:all 0.4s}
#status-badge.open{color:var(--success);border-color:var(--success);background:rgba(0,255,153,0.1)}
#status-badge.closed{color:var(--accent);border-color:var(--accent);background:rgba(0,229,255,0.1)}

/* SIDE-BY-SIDE STATUS BOXES - Twice as high */
.indicators{display:flex; width: 100%; height: 120px; border-bottom:1px solid var(--border)}
.ind{flex: 1; width: 50%; display:flex; align-items:center; justify-content:center;
  font-family:monospace; font-size:13px; font-weight:bold; letter-spacing:0.2em;
  color:var(--muted); text-transform:uppercase; transition: all 0.4s ease;}
.ind:first-child{border-right:1px solid var(--border)}

/* Indicator Lighting */
.ind.active-open { background: rgba(0,255,153,0.2); color: var(--success); box-shadow: inset 0 0 40px rgba(0,255,153,0.1); }
.ind.active-close { background: rgba(0,229,255,0.2); color: var(--accent); box-shadow: inset 0 0 40px rgba(0,229,255,0.1); }

/* CONTROLS - Adjusted padding so Cancel touches the bottom edge */
.controls{padding:16px 16px 0 16px; display:grid; grid-template-columns: 1fr 1fr; gap:10px}
.btn{display:flex; flex-direction:column; align-items:center; justify-content:center;
  padding:22px 8px; border-radius:12px; border:1px solid var(--border);
  background:var(--panel); color:var(--text); font-weight:600; text-transform:uppercase;
  cursor:pointer; transition:all 0.15s; -webkit-appearance:none; appearance:none}
.btn-open{color:var(--success); border-color:rgba(0,255,153,0.2)}
.btn-close{color:var(--accent); border-color:rgba(0,229,255,0.2)}

/* CANCEL BUTTON - Flush with bottom border */
.btn-stop{grid-column: 1 / -1; border-color:rgba(255,61,90,0.4);
  background:rgba(255,61,90,0.07); color:var(--danger);
  padding:38px 13px; font-size:14px; margin-top:10px;
  border-bottom-left-radius: 0; border-bottom-right-radius: 0; border-bottom: none;}

/* LOG - 20% Taller */
.log-card{width:100%; max-width:380px; background:var(--surface);
  border:1px solid var(--border); border-radius:14px; margin-top:10px; overflow:hidden}
#log{padding:10px 14px; max-height:165px; overflow-y:auto; display:flex; flex-direction:column; gap:6px}

/* WARNING BOX */
#warn-banner{display:none; padding:15px; background:rgba(255,176,32,0.1); border-bottom:1px solid var(--warn); align-items:center; gap:10px;}
</style>
</head>
<body>

<header>
  <div class="logo"><span>GARAGE DOOR</span></div>
  <div id="conn-pill" class="connected">
    <div id="conn-dot"></div>
    <span id="conn-label">ONLINE</span>
  </div>
</header>

<div class="card">
  <div class="status-area">
    <div class="garage-title">Door Status</div>
    <div id="status-badge" class="closed">CLOSED</div>
  </div>

  <div class="indicators">
    <div class="ind" id="ind-open">OPEN</div>
    <div class="ind" id="ind-close">CLOSED</div>
  </div>

  <div class="controls">
    <button class="btn btn-open">OPEN</button>
    <button class="btn btn-close">CLOSE</button>
    <button class="btn btn-stop">CANCEL WARNING</button>
  </div>
</div>

<div class="log-card">
  <div style="padding:12px; border-bottom:1px solid var(--border); font-size:10px; color:var(--muted); display:flex; justify-content:space-between">
    <span>EVENT LOG</span>
    <span id="log-count">3 events</span>
  </div>
  <div id="log">
    <div style="font-family:monospace; font-size:11px; display:flex; gap:10px;"><span style="color:var(--muted)">21:05</span><span style="color:var(--success)">Door Closed</span></div>
    <div style="font-family:monospace; font-size:11px; display:flex; gap:10px;"><span style="color:var(--muted)">21:04</span><span style="color:var(--text)">User: Close Cmd</span></div>
    <div style="font-family:monospace; font-size:11px; display:flex; gap:10px;"><span style="color:var(--muted)">21:00</span><span style="color:var(--text)">System Online</span></div>
  </div>
</div>

<script>
// Mock Logic for demonstration
window.addEventListener('load', function() {
  const status = "CLOSED"; // Change to "OPEN" to see toggle
  document.getElementById('ind-open').className  = 'ind' + (status==='OPEN'  ?' active-open':'');
  document.getElementById('ind-close').className = 'ind' + (status==='CLOSED'?' active-close':'');
});
</script>
</body>
</html>
